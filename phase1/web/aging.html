<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Aging 分析 - 企业看板</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://code.iconify.design/3/3.1.1/iconify.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
  body { font-family: 'Inter', 'Microsoft YaHei', sans-serif; background-color: #F0F2F5; }
  .sidebar-item-active { background-color: #1890FF; color: white; }
</style>
</head>
<body class="flex h-screen overflow-hidden">
<div id="sidebar"></div>
<main class="flex-1 flex flex-col overflow-hidden">
<header class="h-16 bg-white border-b flex items-center justify-between px-6 shrink-0">
  <div class="flex items-center gap-4">
    <nav aria-label="Breadcrumb" class="flex text-sm text-gray-500" id="breadcrumb"></nav>
  </div>
  <div class="flex items-center gap-6">
    <span class="iconify text-gray-500 text-xl cursor-pointer" data-icon="ri:notification-3-line"></span>
    <div class="h-4 w-[1px] bg-gray-200"></div>
    <span class="text-sm font-medium text-gray-700" id="today"></span>
  </div>
</header>
<div class="flex-1 overflow-y-auto p-6 space-y-6">
  <div id="loading" class="text-center py-12 text-gray-400">加载中...</div>
  <div id="page-content" class="hidden space-y-6">
    <div class="grid grid-cols-4 gap-6" id="bucket-cards"></div>
    <div class="bg-white p-6 rounded-xl border shadow-sm">
      <h3 class="font-bold text-gray-800 text-lg mb-6">按分类的 Aging 分布</h3>
      <div class="h-[300px] w-full" id="agingChart"></div>
    </div>
    <div class="bg-white rounded-xl border shadow-sm overflow-hidden">
      <div class="px-6 py-4 border-b bg-gray-50/50">
        <h3 class="font-bold text-gray-800">Overdue Top 10</h3>
      </div>
      <table class="w-full text-left">
        <thead class="text-xs text-gray-400 uppercase font-bold bg-gray-50/30">
          <tr>
            <th class="px-6 py-4">Ticket ID</th>
            <th class="px-6 py-4">主题</th>
            <th class="px-6 py-4">分类</th>
            <th class="px-6 py-4">负责人</th>
            <th class="px-6 py-4">状态</th>
            <th class="px-6 py-4 text-right">Aging</th>
          </tr>
        </thead>
        <tbody id="overdue-tbody" class="text-sm divide-y divide-gray-50"></tbody>
      </table>
    </div>
  </div>
</div>
</main>
<script src="assets/common.js"></script>
<script src="assets/auth.js"></script>
<script src="assets/mocks.js"></script>
<script src="assets/api.js"></script>
<script src="assets/sidebar.js"></script>
<script src="pages/aging.js"></script>
<script>imapAuth.init(); imapAuth.requireAuth();</script>
</body>
</html>
