<!-- Dashboard Analytics -->
<div class="grid grid-cols-3 gap-6">
<!-- Conversion Funnel -->

</div>

<!-- Line Chart -->
<div class="bg-white p-6 rounded-xl border shadow-sm">

<div class="h-[350px]" id="growthChart"></div>
</div>
</div>

</div>
<div class="w-[1px] bg-white/10"></div>

</div>
<div class="w-[1px] bg-white/10"></div>

<p class="text-orange-400 text-xs mt-2 flex items-center justify-center gap-1"><span class="iconify" data-icon="ri:pulse-line"></span> 本月持续稳步上升</p>
</div>

</main>
<script>
        // Set Sidebar Active State
        const currentPage = 'analysis';
        document.querySelectorAll('.nav-item').forEach(item => {
            if (item.getAttribute('data-page') === currentPage) {
                item.classList.add('sidebar-item-active');
                item.classList.remove('hover:bg-white/10');
            }
        });

        // Funnel Chart
        const funnel = echarts.init(document.getElementById('funnelChart'));
        funnel.setOption({
            series: [{
                name: 'Funnel', type: 'funnel', left: '10%', top: 20, bottom: 20, width: '80%',
                label: { show: true, position: 'inside', color: '#fff' },
                data: [
                    { value: 100, name: '曝光' },
                    { value: 80, name: '点击' },
                    { value: 60, name: '访问' },
                    { value: 40, name: '下单' },
                    { value: 20, name: '支付' }
                ],
                itemStyle: { borderColor: '#fff', borderWidth: 1 }
            }]
        });

        // Bar Chart
        const bar = echarts.init(document.getElementById('barChart'));
        bar.setOption({
            tooltip: { trigger: 'axis' },
            xAxis: { type: 'category', data: ['北京', '上海', '广州', '深圳', '杭州', '成都', '南京', '武汉'], axisLine: { show: false } },
            yAxis: { type: 'value', splitLine: { lineStyle: { type: 'dashed' } } },
            series: [{ 
                data: [1200, 1500, 800, 950, 1100, 700, 600, 500], 
                type: 'bar', 
                barWidth: '40%',
                itemStyle: { 
                    color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [{ offset: 0, color: '#1890FF' }, { offset: 1, color: '#69c0ff' }]),
                    borderRadius: [4, 4, 0, 0]
                } 
            }]
        });

        // Pie Chart
        const pie = echarts.init(document.getElementById('pieChart'));
        pie.setOption({
            tooltip: { trigger: 'item' },
            legend: { bottom: '0', left: 'center' },
            series: [{
                name: '销售来源', type: 'pie', radius: ['40%', '70%'], avoidLabelOverlap: false,
                itemStyle: { borderRadius: 10, borderColor: '#fff', borderWidth: 2 },
                label: { show: false },
                data: [
                    { value: 1048, name: '家用电器' },
                    { value: 735, name: '电子产品' },
                    { value: 580, name: '服饰鞋帽' },
                    { value: 484, name: '家具美妆' },
                    { value: 300, name: '生鲜水果' }
                ]
            }]
        });

        // Growth Chart
        const growth = echarts.init(document.getElementById('growthChart'));
        growth.setOption({
            xAxis: { type: 'category', data: ['Q1', 'Q2', 'Q3', 'Q4'], axisLine: { show: false } },
            yAxis: { type: 'value' },
            series: [{ 
                data: [420, 532, 701, 934], 
                type: 'line', 
                smooth: true,
                lineStyle: { width: 4 },
                areaStyle: { opacity: 0.1 }
            }]
        });

        window.addEventListener('resize', () => {
            funnel.resize(); bar.resize(); pie.resize(); growth.resize();
        });
    </script>
