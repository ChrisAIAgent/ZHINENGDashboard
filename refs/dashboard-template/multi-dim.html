<!-- Linkage Filters -->

<div class="bg-white p-4 rounded-xl shadow-sm border">

<option>按产品系列分类 (Product)</option>
<option>按地理区域分类 (Territory)</option>

</select>
</div>
<div class="bg-white p-4 rounded-xl shadow-sm border">
<p class="text-xs text-gray-400 uppercase font-bold mb-2">数据颗粒度</p>
<div class="flex gap-2">
<button class="flex-1 bg-blue-600 text-white py-2 rounded text-xs font-semibold">天级</button>

<div class="w-3 h-3 bg-white rounded-full ml-auto"></div>

</div>

<!-- Drill-down & Linkage Simulation -->
<div class="grid grid-cols-2 gap-6 h-[500px]">
<div class="bg-white p-6 rounded-xl border shadow-sm flex flex-col">
<div class="flex justify-between items-center mb-6">
<h3 class="font-bold text-gray-800">各地区销售额占比 (点击省份下钻)</h3>
<span class="text-xs text-blue-600 cursor-pointer">返回上一层级</span>
</div>
<div class="flex-1" id="mapChart"></div>
</div>
<div class="bg-white p-6 rounded-xl border shadow-sm flex flex-col">
<h3 class="font-bold text-gray-800 mb-6">销售与毛利联动分析 (散点图)</h3>
<div class="flex-1" id="scatterChart"></div>
</div>
</div>
<div class="bg-white p-6 rounded-xl border shadow-sm">
<h3 class="font-bold text-gray-800 mb-6">多指标雷达图 - 市场竞争力分析</h3>
<div class="h-[400px]" id="radarChart"></div>
</div>
</div>
</main>
<script>
        // Set Sidebar Active State
        const currentPage = 'multi-dim';
        document.querySelectorAll('.nav-item').forEach(item => {
            if (item.getAttribute('data-page') === currentPage) {
                item.classList.add('sidebar-item-active');
                item.classList.remove('hover:bg-white/10');
            }
        });

        // Map Chart Simulation
        const map = echarts.init(document.getElementById('mapChart'));
        map.setOption({
            tooltip: { trigger: 'item' },
            legend: { top: 'bottom' },
            series: [{
                name: '销售强度', type: 'pie', radius: [20, 140], center: ['50%', '50%'], roseType: 'area',
                itemStyle: { borderRadius: 8 },
                data: [
                    { value: 40, name: '华东地区' },
                    { value: 32, name: '华南地区' },
                    { value: 28, name: '华北地区' },
                    { value: 25, name: '西南地区' },
                    { value: 20, name: '西北地区' },
                    { value: 18, name: '华中地区' },
                    { value: 12, name: '东北地区' }
                ]
            }]
        });

        // Scatter Chart
        const scatter = echarts.init(document.getElementById('scatterChart'));
        scatter.setOption({
            grid: { top: 20, right: 20 },
            xAxis: { name: '销售额', splitLine: { lineStyle: { type: 'dashed' } } },
            yAxis: { name: '毛利率', splitLine: { lineStyle: { type: 'dashed' } } },
            series: [{
                symbolSize: 20,
                data: [[10.0, 8.04], [8.0, 6.95], [13.0, 7.58], [9.0, 8.81], [11.0, 8.33], [14.0, 9.96], [6.0, 7.24], [4.0, 4.26], [12.0, 10.84], [7.0, 4.82], [5.0, 5.68]],
                type: 'scatter',
                itemStyle: { color: '#FAAD14' }
            }]
        });

        // Radar Chart
        const radar = echarts.init(document.getElementById('radarChart'));
        radar.setOption({
            radar: {
                indicator: [
                    { name: '研发能力', max: 100 },
                    { name: '市场占有率', max: 100 },
                    { name: '客户满意度', max: 100 },
                    { name: '响应速度', max: 100 },
                    { name: '品牌知名度', max: 100 },
                    { name: '财务稳健性', max: 100 }
                ]
            },
            series: [{
                name: 'Matrix vs Benchmark',
                type: 'radar',
                data: [
                    { value: [92, 85, 78, 95, 80, 88], name: 'Matrix 系统 (2026)', areaStyle: { color: 'rgba(24, 144, 255, 0.3)' } },
                    { value: [70, 75, 82, 60, 85, 74], name: '行业标杆值 (Benchmark)', areaStyle: { color: 'rgba(82, 196, 26, 0.2)' } }
                ]
            }]
        });

        window.addEventListener('resize', () => { map.resize(); scatter.resize(); radar.resize(); });
    </script>
